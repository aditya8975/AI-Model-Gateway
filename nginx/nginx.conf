worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    application/json text/plain;

    log_format main '$remote_addr - [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_x_request_id" '
                     'rt=$request_time';
    access_log /dev/stdout main;
    error_log  /dev/stderr warn;

    # Docker's embedded DNS resolver -- lets us re-resolve the `gateway`
    # service name at runtime, so `docker compose up --scale gateway=N`
    # spreads load across all replicas instead of caching a single IP.
    resolver 127.0.0.11 valid=10s;

    # Coarse edge-level rate limiting (defense in depth; the gateway
    # service itself enforces accurate per-API-key limits via Redis).
    limit_req_zone $binary_remote_addr zone=edge_limit:10m rate=20r/s;
    limit_req_status 429;

    upstream gateway_upstream {
        # Single static entry kept for the non-scaled default case;
        # when scaling, prefer the resolver + variable proxy_pass below.
        server gateway:8000;
    }

    server {
        listen 80;
        client_max_body_size 30m;

        # ---- Health check passthrough (no rate limiting, no logging noise) ----
        location = /health {
            proxy_pass http://gateway_upstream/health;
            access_log off;
        }

        # ---- Prometheus metrics passthrough ----
        location = /metrics {
            proxy_pass http://gateway_upstream/metrics;
            access_log off;
        }

        # ---- Streaming LLM responses: disable buffering so SSE chunks
        # reach the client immediately instead of being held by Nginx ----
        location ~* /v1/(llm/chat/stream|gateway)$ {
            limit_req zone=edge_limit burst=40 nodelay;

            proxy_pass http://gateway_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 300s;
        }

        # ---- Everything else ----
        location / {
            limit_req zone=edge_limit burst=40 nodelay;

            proxy_pass http://gateway_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
