global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: "ai-model-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway:8000"]
        labels:
          service: "gateway"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
